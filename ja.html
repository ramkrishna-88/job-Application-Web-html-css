<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application</title>
    <link rel="stylesheet" href="ja.css">
</head>
<body>
    <div class="container">
        <div class="apply_box">
            <h1>Job Application
                <span class="title">(Web)</span><!--Spam is used to edit the text-->
            </h1> 
            <form action="">
                <div class="form_container">
                    <div class="form_controler">
                        <label for="first_name">First Name</label>
                        <input id="first_name" name="first_name" placeholder="Enter First Name"/>
                    </div>
                    <div class="form_controler">
                        <label for="Last_name">Last Name</label>
                        <input id="Last_name" name="Last_name" placeholder="Enter Last Name"/>
                    </div>
                </div>
                <div class="form_container">
                    <div class="form_controler">
                        <label for="email">Email</label>
                        <input id="email" name="email" placeholder="Enter Email"/>
                    </div>
                    <div class="form_controler">
                        <label for="job_role">Job Role</label>
                        <select id="job_role" name="job_role">
                            <option value="">Select Job Role</option>
                            <option value="frontend">Frontend Developer</option>
                            <option value="backend">Backend Developer</option>
                            <option value="full_stack">Full stack Developer</option>
                            <option value="UI_UX">UI UX Developer</option>
                        </select>
                    </div>
                </div>
                <div class="textarea_control">
                    <div class="form_controler">
                        <label for="address">Address</label>
                        <textarea id="address" name="address" row="4" cols="50" placeholder="Enter the Address"></textarea>
                    </div>
                </div>
                <div class="form_container">
                    <div class="form_controler">
                        <label for="city">City</label>
                        <input id="city" name="city" placeholder="Enter City"/>
                    </div>
                    <div class="form_controler">
                        <label for="pincode">Pincode</label>
                        <input  type="number" id="pincode" name="pincode" placeholder="Enter Pincode"/>
                    </div>
                </div>
                <div class="form_container">
                    <div class="form_controler">
                        <label for="date">Date</label>
                        <input type="date"id="date" name="date"/>
                    </div>
                    <div class="form_controler">
                        <label for="upload">Upload Your Cv</label>
                        <input  type="file" id="upload" name="upload"/>
                    </div>
                </div>
                <div class="button">
                    <button type="submit">Apply Now</button>
                </div>
            </form>          
        </div>
    </div>
</body>
</html>
